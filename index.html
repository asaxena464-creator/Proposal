<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Akanksha ❤️</title>

<style>
/* ========== THEME ========== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #ffe6f0);
  overflow-x: hidden;
  text-align: center;
  color: #333;
}

.container {
  padding: 20px;
}

/* ========== FLOATING HEARTS ========== */
.heart {
  position: fixed;
  bottom: -10px;
  color: pink;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* ========== INTRO TEXT ========== */
#intro {
  font-size: 18px;
  margin: 20px auto;
  max-width: 600px;
  min-height: 120px;
}

/* ========== SLIDESHOW ========== */
.slideshow {
  width: 100%;
  max-width: 350px;
  margin: 20px auto;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  background: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 400px; /* adjust if needed */
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1s ease;
}

.slide.active {
  opacity: 1;
}

/* ========== PROPOSAL ========== */
h1 {
  font-size: 26px;
  margin-top: 30px;
}

.buttons {
  margin-top: 20px;
  position: relative;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 25px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

#yesBtn {
  background-color: #ff4d88;
  color: white;
}

#noBtn {
  background-color: #999;
  color: white;
  position: absolute;
}

/* ========== CELEBRATION ========== */
#celebration {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffeff5;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-size: 24px;
}

/* ========== MUSIC BUTTON ========== */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff4d88;
  color: white;
  border-radius: 50%;
  padding: 10px;
}

</style>
</head>

<body>

<div class="container">

  <!-- INTRO -->
  <div id="intro"></div>

  <!-- SLIDESHOW -->
  <div class="slideshow">
    <img src="img1.jpeg" class="slide active">
    <img src="img2.jpeg" class="slide active">
    <img src="img3.jpeg" class="slide active">
    <img src="img4.jpeg" class="slide active">
    <img src="img5.jpeg" class="slide active">
    <img src="img6.jpeg" class="slide active">
    <img src="img7.jpeg" class="slide active">
    <img src="img8.jpeg" class="slide active">
    <img src="img9.jpeg" class="slide active">
    <img src="img10.jpeg" class="slide active">
  </div>

  <!-- PROPOSAL -->
  <h1>Akanksha, will you be mine forever? ❤️</h1>

  <div class="buttons">
    <button id="yesBtn">YES 💖</button>
    <button id="noBtn">NO 😜</button>
  </div>

</div>

<!-- CELEBRATION SCREEN -->
<div id="celebration">
  <h2>You just made me the happiest person alive! 💖 तू माझी बायको आहेस  💖</h2>
</div>

<!-- MUSIC -->
<audio id="bgMusic" autoplay loop muted>
  <source src="dooron-dooron.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🎵</button>

<script>

/* ========== TYPING EFFECT ========== */
const text = `Hi Akanksha 💕,

Me Delhi se....
Tu Mumbai se... par dil ka connection same hai ❤️

Humare stubborn attitude me hume milaya...
"You taught me Marathi, but you also taught me love" 💖

तू खूप special आहेस माझ्यासाठी...
Sach bolu? Tu meri life ki best story hai 😍`;

let i = 0;
function typing() {
  if (i < text.length) {
    document.getElementById("intro").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 40);
  }
}
typing();

/* ========== SLIDESHOW ========== */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 2500);

/* ========== FLOATING HEARTS ========== */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 400);

/* ========== NO BUTTON FUN ========== */
const noBtn = document.getElementById("noBtn");

const messages = [
  "Paya tode chee 😏",
  "Are you sure? Think again 😜",
  "गलत बटन दबा दिया क्या? 😏",
  "Come again... ❤️",
  "मी तुला खूप आवडतो 💕",
  "No ka option hi nahi hai 😆",
  "Please reconsider 😭",
  "Soch lo achhe se 😜",
  "दिल से सोचो 💖",
  "तू हो बोलणार आहेस 😏",
  "Last chance! 😆"
];

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * 80;
  const y = Math.random() * 80;
  noBtn.style.left = x + "vw";
  noBtn.style.top = y + "vh";
});

noBtn.addEventListener("click", () => {
  alert(messages[Math.floor(Math.random() * messages.length)]);
});

/* ========== YES BUTTON ========== */
document.getElementById("yesBtn").addEventListener("click", () => {
  document.getElementById("celebration").style.display = "flex";
});

/* ========== MUSIC TOGGLE ========== */
/* MUSIC CONTROL */
const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");

/* Force play on load (muted autoplay) */
window.addEventListener("load", () => {
  music.play().catch(() => {});
});

/* First interaction anywhere → unmute */
function enableSound() {
  music.muted = false;
  music.play();
  document.removeEventListener("click", enableSound);
}
document.addEventListener("click", enableSound);

/* Button toggle */
musicBtn.addEventListener("click", () => {
  if (music.paused) {
    music.play();
  } else {
    music.pause();
  }
});

</script>

</body>
</html>
